<?xml version="1.0" encoding="UTF-8"?>
<!-- OMP mark. Source uses oklch()/CSS min() which CoreSVG (NSImage) cannot parse,
     so dimensions are numeric and the gradient stops are converted to sRGB hex. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="omp-mark-grad" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F84FCC"/>
      <stop offset="0.5" stop-color="#9362F4"/>
      <stop offset="1" stop-color="#00DBE4"/>
    </linearGradient>
  </defs>
  <path fill="url(#omp-mark-grad)" d="M10 14h44v9H43v33h-9V23h-9v22h-9V23H10z"/>
</svg>
