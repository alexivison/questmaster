name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Verify tidy
        run: git diff --exit-code -- go.mod go.sum

      - name: Build
        run: go build -buildvcs=false ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
